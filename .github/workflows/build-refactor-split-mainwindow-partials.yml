name: C#/WPF云编译(Refactor-Split-MainWindow-Partials)

on:
  push:
    branches:
      - refactor-split-mainwindow-partials
  pull_request:
    branches:
      - refactor-split-mainwindow-partials
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    name: 编译校验
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 还原依赖
        run: dotnet restore

      - name: 编译项目(Release)
        run: dotnet build ImageColorChanger.csproj --configuration Release --no-restore

      - name: 发布项目(验证发布链路)
        run: dotnet publish ImageColorChanger.csproj -c Release -r win-x64 -o publish --self-contained false

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: CanvasCast-refactor-split-mainwindow-partials
          path: publish/
          retention-days: 7
